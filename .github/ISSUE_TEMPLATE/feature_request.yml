name: Feature request
description: 建议新功能或体验改进
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        请先说明你遇到的实际使用场景。大改动可能需要先讨论方向。
  - type: textarea
    id: problem
    attributes:
      label: 使用场景或问题
      description: 这个功能要解决什么具体问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望 Quick Memo Applet 怎么表现？
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - 输入窗口
        - 便签窗口
        - Dashboard
        - 数据存储 / 导入导出
        - 打包发布
        - 文档
        - 其他
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果有其他思路或临时解决办法，也可以写在这里。
